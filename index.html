<!DOCTYPE html>
<html>
<head>
    <title>There, up in the High Tower.</title>

    <style>
        body {
            background: black;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: monospace;
        }

        .dialogue-box {
            width: 80%;
            max-width: 900px;
            border: 4px solid white;
            padding: 20px;
            margin-bottom: 40px;
            font-size: 24px;
            line-height: 1.5;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<div class="dialogue-box" id="dialogue">
    Press Space to begin.
</div>

<script>

const dialogue = [
    "???: Milady, you know that I don't usually question your plans, but I have to ask. What is your fixation with this pigment?",

    "???: It is not just a pigment, Archibald. It's the remains of life itself.",

    "Archibald: The closer we get to the origin... the more dangerous. It is basically suicide.",

    "???: I am aware of the risks."
];

let currentLine = -1;

document.addEventListener("keydown", function(event) {

    if (event.code === "Space") {

        currentLine++;

        if (currentLine < dialogue.length) {
            document.getElementById("dialogue").textContent =
                dialogue[currentLine];
        }

    }

});

</script>

</body>
</html>
