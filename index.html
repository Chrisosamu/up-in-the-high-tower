<!DOCTYPE html>
<html>
<head>
    <title>There, up in the High Tower.</title>

    <style>
        body {
            background: black;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: monospace;
        }

        .dialogue-box {
            width: 80%;
            max-width: 900px;
            border: 4px solid white;
            padding: 20px;
            margin-bottom: 40px;
            font-size: 24px;
            line-height: 1.5;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<div class="dialogue-box" id="dialogue">
    Press Space to begin.
</div>

<div id="ending-screen" style="
    opacity:0;
    pointer-events:none;

    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:black;

    transition:opacity 2s ease;
">

    <img src="ending.png" style="
        width:100%;
        height:100%;
        object-fit:contain;
    ">

</div>
<script>

const miladyAudio = new Audio("Milady.mp3");
const archibaldAudio = new Audio("Archibald.mp3");
const endingMusic = new Audio("ending.mp3");

function playSoundForSpeaker(speaker, char) {

    // silence rules
    if (
        char === "." ||
        char === "," ||
        char === "!" ||
        char === "?" ||
        char === " "
    ) {
        return;
    }

    let src;

    if (speaker === "Archibald") {
        src = "archibald.mp3";
    } else {
        src = "milady.mp3";
    }

    const sound = new Audio(src);

    sound.volume = 0.25;
    sound.playbackRate = 0.95 + Math.random() * 0.1;

    sound.play();
}

function showEnding() {

    document.querySelector(".dialogue-box").style.display = "none";

    const endingScreen = document.getElementById("ending-screen");

    endingScreen.style.opacity = "1";

}
    
const dialogue = [
    { speaker: "Archibald", text: "Milady, you know that I don't usually question your plans but, I have to ask. What is your fixation with this pigment?" },

    { speaker: "???", text: "It is not just a pigment, Archibald. It's the remains of life itself. We're traveling back to collect dust of what was broken long ago. If we can't prevent the Tragedy, we shall at least fix it." },

    { speaker: "Archibald", text: "...The closer we get to the origin... the more dangerous. It is basically suicide." },

    { speaker: "???", text: "I am aware of the risks. I am not forcing you to come with me but... wouldn't it be nice to see your daughter again?" },

    { speaker: "Archibald", text: "If we should be successful in bringing them all back... I sincerely doubt I will be there to see my daughter smile once again." },

    { speaker: "Archibald", text: "Though, her life is way more important than mine." },

    { speaker: "???", text: "So whaddaya say? One last mission together... friend?" },

    { speaker: "Archibald", text: "I shall serve you and no other, Milady." },

    { speaker: "???", text: "Ahah, very well then." }
];

let currentLine = 0;
let isTyping = false;
let charIndex = 0;
let skipTyping = false;

const box = document.getElementById("dialogue");

function typeLine(lineObj) {
    isTyping = true;
    charIndex = 0;
    box.textContent = "";

    const fullText = lineObj.speaker + ": " + lineObj.text;

    function typeChar() {

        if (skipTyping) {
            box.textContent = fullText;
            isTyping = false;
            skipTyping = false;
            return;
        }

        if (charIndex < fullText.length) {
            box.textContent += fullText.charAt(charIndex);
charIndex++;

// 🔊 sound per letter
playSoundForSpeaker(lineObj.speaker, fullText.charAt(charIndex));
setTimeout(typeChar, 25);
        } else {
            isTyping = false;
        }
    }

    typeChar();
}


document.addEventListener("keydown", function(event) {

    if (event.code === "Space") {

        event.preventDefault();

        if (isTyping) {
            skipTyping = true;
            return;
        }

        if (currentLine < dialogue.length) {

    typeLine(dialogue[currentLine]);
    currentLine++;

} else {

    showEnding();

}
    }
});

</script>

</body>
</html>
