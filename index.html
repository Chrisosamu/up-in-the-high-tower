<!DOCTYPE html>
<html>
<head>
    <title>There, up in the High Tower.</title>

    <style>
        body {
            background: black;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: monospace;
        }

        .dialogue-box {
            width: 80%;
            max-width: 900px;
            border: 4px solid white;
            padding: 20px;
            margin-bottom: 40px;
            font-size: 24px;
            line-height: 1.5;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<div class="dialogue-box" id="dialogue">
    Press Space to begin.
</div>

<div id="ending-screen" style="
    opacity:0;
    pointer-events:none;

    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:black;

    transition:opacity 2s ease;
">

    <img src="ending.png" style="
        width:100%;
        height:100%;
        object-fit:contain;
    ">

</div>
<script>

const miladyAudio = new Audio("Milady.mp3");
const archibaldAudio = new Audio("Archibald.mp3");
const endingMusic = new Audio("ending.mp3");

function playSoundForSpeaker(speaker, char) {

    // silence rules
    if (
        char === "." ||
        char === "," ||
        char === "!" ||
        char === "?" ||
        char === " "
    ) {
        return;
    }

    let src;

    if (speaker === "Archibald") {
        src = "archibald.mp3";
    } else {
        src = "milady.mp3";
    }

    const sound = new Audio(src);

    sound.volume = 0.25;
    sound.playbackRate = 0.95 + Math.random() * 0.1;

    sound.play();
}

function showEnding() {

    document.querySelector(".dialogue-box").style.display = "none";

    const endingScreen = document.getElementById("ending-screen");

    setTimeout(function() {

        endingScreen.style.opacity = "1";

        endingMusic.volume = 0.5;
        endingMusic.play();

    }, 2000);

}
    
const dialogue = [

    { speaker: "Archibald", text: "Milady, you know that I don't usually question your plans but..." },
    { speaker: "Archibald", text: "I have to ask." },
    { speaker: "Archibald", text: "...What is your fixation with this pigment?" },

    { speaker: "???", text: "It is not just a pigment, Archibald." },
    { speaker: "???", text: "It is the remains of life itself." },
    { speaker: "???", text: "We're traveling back to collect the dust of what was broken long ago..." },
    { speaker: "???", text: "If we can't prevent the Tragedy..." },
    { speaker: "???", text: "...then at least..." },
    { speaker: "???", text: "...we should fix it." },

    { speaker: "Archibald", text: "..." },
    { speaker: "Archibald", text: "\"Far closer to the origin...\"" },
    { speaker: "Archibald", text: "\"That's where the evil lies.\"" },
    { speaker: "Archibald", text: "It is basically suicide." },

    { speaker: "???", text: "I am aware of the risks." },

    { speaker: "Archibald", text: "..." },

    { speaker: "???", text: "I'm not forcing you to come with me..." },
    { speaker: "???", text: "But wouldn't it be nice to see your daughter again?" },

    { speaker: "Archibald", text: "Heh." },
    { speaker: "Archibald", text: "If we should be successful in bringing them all back..." },
    { speaker: "Archibald", text: "I... do not think I will get to see my daughter... Milady." },
    { speaker: "Archibald", text: "Though her life is far more important than mine." },

    { speaker: "???", text: "Whaddaya say then?" },
    { speaker: "???", text: "One last mission together, friend?" },

    { speaker: "Archibald", text: "I shall serve you and no other, Milady." },

    { speaker: "???", text: "Hehe, very well!" },
    { speaker: "???", text: "Next step..." },
    { speaker: "???", text: "Luxia." }

];

let currentLine = 0;
let isTyping = false;
let charIndex = 0;
let skipTyping = false;

const box = document.getElementById("dialogue");

function typeLine(lineObj) {
    isTyping = true;
    charIndex = 0;
    box.textContent = "";

    const fullText = lineObj.speaker + ": " + lineObj.text;

    function typeChar() {

        if (skipTyping) {
            box.textContent = fullText;
            isTyping = false;
            skipTyping = false;
            return;
        }

        if (charIndex < fullText.length) {

    const currentChar = fullText.charAt(charIndex);

    box.textContent += currentChar;

    playSoundForSpeaker(lineObj.speaker, currentChar);

    charIndex++;

    let delay = 40;

    if (currentChar === ",")
        delay = 150;

    if (currentChar === ".")
        delay = 250;

    if (currentChar === "!")
        delay = 180;

    if (currentChar === "?")
        delay = 180;

    setTimeout(typeChar, delay);

} else {

    isTyping = false;

}
    }

    typeChar();
}


document.addEventListener("keydown", function(event) {

    if (event.code === "Space") {

        event.preventDefault();

        if (isTyping) {
            skipTyping = true;
            return;
        }

        if (currentLine < dialogue.length) {

    typeLine(dialogue[currentLine]);
    currentLine++;

} else {

    showEnding();

}
    }
});

</script>

</body>
</html>
