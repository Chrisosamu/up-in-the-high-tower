<!DOCTYPE html>
<html>
<head>
    <title>There, up in the High Tower.</title>

    <style>
        body {
            background: black;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: monospace;
        }

        .dialogue-box {
            width: 80%;
            max-width: 900px;
            border: 4px solid white;
            padding: 20px;
            margin-bottom: 40px;
            font-size: 24px;
            line-height: 1.5;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<div class="dialogue-box" id="dialogue">
    Press Space to begin.
</div>

<script>

const dialogue = [
    "???: Milady, you know that I don't usually question your plans, but I have to ask. What is your fixation with this pigment?",
    "???: It is not just a pigment, Archibald. It's the remains of life itself.",
    "Archibald: The closer we get to the origin... the more dangerous. It is basically suicide.",
    "???: I am aware of the risks."
];

let currentLine = 0;
let isTyping = false;
let charIndex = 0;

const box = document.getElementById("dialogue");

function typeLine(text) {
    isTyping = true;
    charIndex = 0;
    box.textContent = "";

    function typeChar() {
        if (charIndex < text.length) {
            box.textContent += text.charAt(charIndex);
            charIndex++;
            setTimeout(typeChar, 25); // speed of typing
        } else {
            isTyping = false;
        }
    }

    typeChar();
}

document.addEventListener("keydown", function(event) {

    if (event.code === "Space") {

        if (isTyping) return; // prevents skipping mid-type

        if (currentLine < dialogue.length) {
            typeLine(dialogue[currentLine]);
            currentLine++;
        }

    }

});

</script>

</body>
</html>
